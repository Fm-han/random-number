<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机数生成器 - 指定范围随机整数/小数生成</title>
  <meta name="description" content="免费在线随机数生成器，支持指定范围、随机小数、批量生成、不重复随机数，浏览器本地处理。">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://fm-han.github.io/random-number/">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; color: #333; line-height: 1.6; background: #fafafa; }
    h1 { text-align: center; font-size: 1.8rem; color: #1a1a1a; }
    h1 small { display: block; font-size: 0.85rem; color: #666; margin-top: 4px; font-weight: normal; }
    .section { margin: 20px 0; padding: 16px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; }
    .section label { display: block; font-weight: 600; margin-bottom: 8px; }
    .row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    .row label { white-space: nowrap; min-width: 60px; }
    input, select { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; }
    input[type="number"] { width: 120px; }
    .checkbox-row { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
    .checkbox-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; white-space: nowrap; }
    .output { background: #f8f9fa; border-radius: 6px; padding: 16px; margin-top: 12px; font-family: monospace; font-size: 1.1rem; text-align: center; min-height: 60px; }
    .output span { display: inline-block; padding: 6px 12px; background: #fff; border-radius: 4px; margin: 4px; border: 1px solid #e0e0e0; cursor: pointer; }
    .output span:hover { background: #e3f2fd; }
    .buttons { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
    .btn-primary { background: #007bff; color: #fff; }
    .btn-copy { background: #28a745; color: #fff; }
    .btn-clear { background: #6c757d; color: #fff; }
    button:hover { opacity: 0.9; }
    .footer { text-align: center; margin: 24px 0; padding: 12px; font-size: 0.85rem; color: #28a745; font-weight: 500; }
  </style>
</head>
<body>

  <h1>随机数生成器 <small>指定范围 / 整数 / 小数 / 不重复 · 浏览器本地</small></h1>

  <div class="section">
    <div class="row">
      <label>最小值:</label>
      <input type="number" id="min" value="1">
      <label>最大值:</label>
      <input type="number" id="max" value="100">
      <label>数量:</label>
      <input type="number" id="count" value="10" min="1" max="1000">
    </div>
    <div class="checkbox-row">
      <label><input type="checkbox" id="decimal"> 随机小数（保留2位）</label>
      <label><input type="checkbox" id="unique"> 不重复（仅整数模式）</label>
    </div>
    <div class="buttons">
      <button class="btn-primary" onclick="generate()">生成</button>
      <button class="btn-copy" onclick="copyAll()">复制全部</button>
      <button class="btn-clear" onclick="document.getElementById('output').innerHTML=''">清空</button>
    </div>
  </div>

  <div class="section">
    <label>结果（点击数字可复制）</label>
    <div class="output" id="output">
      <span style="color:#999;">点击"生成"开始</span>
    </div>
  </div>

  <div class="footer">100% 免费 · 数据不上传服务器 · 仅浏览器本地处理</div>

  <script>
    function generate() {
      const min = parseFloat(document.getElementById('min').value) || 0;
      const max = parseFloat(document.getElementById('max').value) || 100;
      const count = parseInt(document.getElementById('count').value) || 1;
      const isDecimal = document.getElementById('decimal').checked;
      const isUnique = document.getElementById('unique').checked;

      const container = document.getElementById('output');
      container.innerHTML = '';

      if (isUnique && !isDecimal) {
        if (count > max - min + 1) {
          container.innerHTML = '<span style="color:#dc3545;">数量不能超过范围大小</span>';
          return;
        }
        const nums = [];
        while (nums.length < count) {
          const n = Math.floor(Math.random() * (max - min + 1)) + min;
          if (!nums.includes(n)) nums.push(n);
        }
        nums.forEach(n => addNum(n, container));
      } else {
        for (let i = 0; i < Math.min(count, 1000); i++) {
          const n = isDecimal
            ? parseFloat((Math.random() * (max - min) + min).toFixed(2))
            : Math.floor(Math.random() * (max - min + 1)) + min;
          addNum(n, container);
        }
      }
    }

    function addNum(n, container) {
      const span = document.createElement('span');
      span.textContent = n;
      span.onclick = () => {
        navigator.clipboard.writeText(String(n)).then(() => {
          const orig = span.style.background;
          span.style.background = '#c8e6c9';
          setTimeout(() => span.style.background = orig, 300);
        });
      };
      container.appendChild(span);
    }

    function copyAll() {
      const nums = Array.from(document.querySelectorAll('#output span')).map(el => el.textContent);
      if (!nums.length) return;
      navigator.clipboard.writeText(nums.join(', ')).then(() => alert('已复制!'));
    }
  </script>
</body>
</html>
